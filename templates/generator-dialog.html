<form class="sceneforge-form">
  <div class="form-group">
    <label for="sf-prompt">Prompt</label>
    <textarea
      id="sf-prompt"
      name="prompt"
      rows="4"
      placeholder="Example: Create a ruined forest temple with a boss room, two side chambers, broken pillars, and torch lighting."
      required
    ></textarea>
    <p class="notes">
      Describe the layout mood and major room ideas in plain language.
    </p>
    <button type="button" class="sceneforge-autodetect-btn">
      <i class="fas fa-magnifying-glass"></i> Auto Detect From Prompt
    </button>
  </div>

  <div class="form-group">
    <label for="sf-scene-size">Scene Size</label>
    <select id="sf-scene-size" name="sceneSize">
      <option value="small">Small (30x30)</option>
      <option value="medium" selected>Medium (50x50)</option>
      <option value="large">Large (70x70)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="sf-theme">Theme</label>
    <select id="sf-theme" name="theme">
      <option value="tavern">Tavern</option>
      <option value="cave">Cave</option>
      <option value="forest-ruins" selected>Forest Ruins</option>
      <option value="dungeon">Dungeon</option>
    </select>
  </div>

  <div class="form-group">
    <label for="sf-lighting-mood">Lighting Mood</label>
    <select id="sf-lighting-mood" name="lightingMood">
      <option value="bright">Bright</option>
      <option value="dim" selected>Dim</option>
      <option value="dark">Dark</option>
      <option value="night">Night</option>
      <option value="magical">Magical</option>
    </select>
  </div>

  <div class="form-group">
    <label for="sf-seed">Random Seed (optional)</label>
    <input
      id="sf-seed"
      name="seed"
      type="text"
      placeholder="Leave blank to auto-generate a seed"
    />
    <p class="notes">
      Use the same seed + options to reproduce the same layout.
    </p>
  </div>

  <div class="form-group">
    <label class="checkbox">
      <input id="sf-use-detected-settings" name="useDetectedSettings" type="checkbox" checked />
      Use Detected Settings
    </label>
    <p class="notes">
      When enabled, detected theme/size/lighting/features override manual options.
    </p>
  </div>

  <div class="form-group sceneforge-detected-results" aria-live="polite">
    <label>Detected Results</label>
    <div class="sceneforge-detected-content">
      <p class="notes">Click "Auto Detect From Prompt" to analyze your text.</p>
    </div>
  </div>
</form>
