<form class="sceneforge-form">
  <div class="form-group">
    <label for="sf-prompt">Prompt</label>
    <textarea
      id="sf-prompt"
      name="prompt"
      rows="4"
      placeholder="Example: Forest road through tall pines with a small creek crossing and mossy stones."
      required
    ></textarea>
    <p class="notes">
      Describe the map you want in plain language.
    </p>
  </div>

  <div class="form-group">
    <label for="sf-seed">Random Seed (optional)</label>
    <input
      id="sf-seed"
      name="seed"
      type="text"
      placeholder="Leave blank to auto-generate a seed"
    />
    <p class="notes">
      Seed is reserved for future reproducibility controls.
    </p>
  </div>
</form>
