<form class="sceneforge-form">
  <div class="form-group">
    <label for="sf-prompt">Prompt</label>
    <textarea
      id="sf-prompt"
      name="prompt"
      rows="4"
      placeholder="Example: Create a ruined forest temple with a boss room, two side chambers, broken pillars, and torch lighting."
      required
    ></textarea>
    <p class="notes">
      Describe the layout mood and major room ideas in plain language.
    </p>
  </div>

  <div class="form-group">
    <label for="sf-seed">Random Seed (optional)</label>
    <input
      id="sf-seed"
      name="seed"
      type="text"
      placeholder="Leave blank to auto-generate a seed"
    />
    <p class="notes">
      Use the same seed + prompt to reproduce the same plan and layout.
    </p>
  </div>
</form>
